<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.0/jquery.min.js "
        integrity="sha512-3gJwYpMe3QewGELv8k/BX9vcqhryRdzRMxVfq6ngyWXwo03GFEzjsUm8Q7RZcHPHksttq7/GFoxjCVUjkjvPdw=="
        crossorigin=" anonymous " referrerpolicy="no-referrer "></script>
    <script src="nui://game/ui/jquery.js" type="text/javascript"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <title>Jail Ui By: Asher </title>
</head>

 

<body class="bg-transparent">
    <div class="container-fluid text-center">
        <div class="col mt-auto ">
            <div class="box-center-bill" style="display: none;">
                  <div class="title">
                    <span class="title-text">BILLING</span> 
                </div>
                <div class="btns-bill">

                    <button type="button" class="btn-bill">ค้างชำระ</button>
                    <button type="button" class="btn-history">ประวัติบิล</button>

                </div>
                <div class="data-center-bill">
                    <div class="listbill ">
                        <table class="tables-bill">
                            <thead>
                                <tr>
                                    <th scope="col " class="first-col">บิล</th>
                                    <th scope="col">จำนวน</th>
                                    <th scope="col">รับเมื่อ</th>
                                    <th scope="col">หน่วยงาน</th>
                                    <th scope="col "class="last-col">ชำระ</th>
                                </tr>
                            </thead>
                            
                           
                           
                        </table>
                    </div>
                </div>
            </div>
        </div>



    </div>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const maxLength = 10;

            document.querySelectorAll('td[scope="row"]').forEach(td => {
                const fullText = td.textContent.trim();

                if (fullText.length > maxLength) {
                    const shortText = fullText.substring(0, maxLength) + "...";

                    td.innerHTML = `<span class="custom-tooltip" data-tooltip="${fullText}">${shortText}</span>`;
                }
            });
        });
    </script>
    <script src="script.js"></script>


</body>

</html>
